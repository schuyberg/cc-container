services:
  cc-container:
    build:
      context: .
      args:
        USER_UID: ${USER_UID:-1000}
        USER_GID: ${USER_GID:-1000}
    image: cc-container-dev:latest
    command: ["sleep", "infinity"]
    stdin_open: true
    tty: true
    working_dir: /workspace/${SESSION_NAME:?SESSION_NAME must be set (launched via cc-container, which always sets it)}
    labels:
      - "claude-code.session=${SESSION_NAME:-default}"

    # --- Containment ---
    cap_drop:
      - ALL
    cap_add:
      # NET_ADMIN/NET_RAW: used briefly by entrypoint.sh (as root) to set up
      # the outbound firewall.
      # SETUID/SETGID: required by gosu to drop from root to the claude user;
      # cap_drop: ALL strips these even from UID 0.
      # CHOWN: required by entrypoint.sh to fix auth volume file ownership when
      # the volume was written as root or after a UID change.
      - NET_ADMIN
      - NET_RAW
      - SETUID
      - SETGID
      - CHOWN
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:exec,size=1g
    mem_limit: 4g
    pids_limit: 512
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/.entrypoint-done"]
      interval: 1s
      timeout: 5s
      retries: 15
      start_period: 5s

    volumes:
      - ${DEV_DIR:-./workspace}:/workspace/${SESSION_NAME:?SESSION_NAME must be set (launched via cc-container, which always sets it)}
      - claude-config:/home/claude/.claude
    # Injects KEY=VALUE pairs from a host file straight into the container's
    # environment. The file itself is read by the `docker compose` CLI on
    # the host and is never bind-mounted or copied into the container, so it
    # never appears under /workspace where Claude Code's file tools could
    # read it. Set via SESSION_ENV_FILE (cc-container launch --env-file);
    # defaults to /dev/null (empty) when not provided.
    env_file:
      - ${SESSION_ENV_FILE:-/dev/null}
    environment:
      - CLAUDE_CONFIG_DIR=/home/claude/.claude
      # Firewall defaults to "open" (any host, ports 80/443 only). Set
      # FIREWALL_MODE=strict for the old default-deny domain-allowlist
      # behavior, e.g.: FIREWALL_MODE=strict ./cc-container launch ~/projects/foo
      - FIREWALL_MODE=${FIREWALL_MODE:-}
      # strict mode only: add project-specific allowed hosts, e.g.:
      #   FIREWALL_MODE=strict EXTRA_ALLOWED_DOMAINS=example.com ./cc-container launch ~/projects/foo
      - EXTRA_ALLOWED_DOMAINS=${EXTRA_ALLOWED_DOMAINS:-}
      # Open specific additional ports (any destination) on demand, in
      # either mode, e.g.: EXTRA_ALLOWED_PORTS=5432,22 ./cc-container launch ~/projects/foo
      - EXTRA_ALLOWED_PORTS=${EXTRA_ALLOWED_PORTS:-}

    ports:
      - "${PORT1:-3000}:3000"
      - "${PORT2:-5173}:5173"
      - "${PORT3:-8080}:8080"
      - "${PORT4:-8000}:8000"

volumes:
  claude-config:
    external: true
    name: claude-code-auth
